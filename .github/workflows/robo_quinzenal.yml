name: Robô do Detran - Quinzenal

# Define quando o robô vai rodar
on:
  schedule:
    # Roda às 08:00 (UTC) todo dia 1 e 15 do mês (Isso dá a quinzena perfeita)
    - cron: '0 8 1,15 * *'
  
  # Permite que você dê o "Play" manualmente clicando em um botão no GitHub se precisar!
  workflow_dispatch: 

jobs:
  executar_robo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixar os arquivos do repositório
        uses: actions/checkout@v3
        
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Instalar Bibliotecas
        run: pip install -r requirements.txt
        
      - name: Rodar o Robô (A Mágica!)
        env:
          # Aqui ele pega o cofre que você criou lá atrás
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python main.py

name: Robô do Detran - Quinzenal

on:
  schedule:
    - cron: '0 8 1,15 * *'
  workflow_dispatch: 

jobs:
  executar_robo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixar os arquivos do repositório
        uses: actions/checkout@v4  # <-- Atualizado para v4
        
      - name: Instalar Python
        uses: actions/setup-python@v5  # <-- Atualizado para v5
        with:
          python-version: '3.10'
          
      - name: Instalar Bibliotecas
        run: pip install -r requirements.txt
        
      - name: Rodar o Robô (A Mágica!)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python main.py
